name: Learning YAML

on:
 push:
   branches: [ "main" ]

jobs:
  my-first-job:
   runs-on: ubuntu-latest
  
   steps:
     - name: Single line command
       run: echo "I am a single line command"
       
     - name: Multi line command
       run: |
          echo "Line 1"
          echo "Line 2"
          echo "Line 3"

     - name: Show machine info
       run: |
          echo "OS info:"
          uname -a
          echo "Current directory:"
          pwd
          echo "Files here:"
          ls -la
       

